name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Prepare Release
        id: prepare_release
        run: |
          echo "TAG=v$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV
          echo "APK_PATH=$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)" >> $GITHUB_ENV

      - name: Upload APK to Repository
        uses: stefanzachase/git-auto-commit-action@v5
        with:
          commit_message: "ci: upload latest debug apk [skip ci]"
          file_pattern: 'app/build/outputs/apk/debug/*.apk'
          branch: main
